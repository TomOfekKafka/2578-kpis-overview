<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#4646CE"/>

  <!-- Bar chart bars -->
  <rect x="8" y="36" width="8" height="16" rx="2" fill="#ffffff" opacity="0.5"/>
  <rect x="19" y="28" width="8" height="24" rx="2" fill="#ffffff" opacity="0.7"/>
  <rect x="30" y="20" width="8" height="32" rx="2" fill="#ffffff"/>
  <rect x="41" y="24" width="8" height="28" rx="2" fill="#f97316"/>

  <!-- Trend line -->
  <polyline points="12,34 23,26 34,18 45,22" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trend line dots -->
  <circle cx="12" cy="34" r="2.5" fill="#10b981"/>
  <circle cx="23" cy="26" r="2.5" fill="#10b981"/>
  <circle cx="34" cy="18" r="2.5" fill="#10b981"/>
  <circle cx="45" cy="22" r="2.5" fill="#10b981"/>

  <!-- Bottom axis -->
  <line x1="6" y1="54" x2="58" y2="54" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
